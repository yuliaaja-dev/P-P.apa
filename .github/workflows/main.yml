name: Build APK Sukses

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Inisialisasi Aplikasi Webview
      run: |
        mkdir -p android-app && cd android-app
        npm init -y
        # Install Capacitor Core & CLI
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Buat konfigurasi otomatis mengarah ke URL webappbuilder kamu
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.appbuilder.id",
          "appName": "AppBuilder",
          "webDir": "www",
          "server": {
            "url": "https://appbuilderry.vercel.app/",
            "cleartext": true
          }
        }
        EOF
        
        # Buat folder dummy www agar tidak error saat inisialisasi
        mkdir www && echo "<html></html>" > www/index.html
        
        # Tambahkan platform android ke project
        npx cap add android

    - name: Kompilasi Menjadi APK
      run: |
        cd android-app/android
        # Jalankan gradle wrapper bawaan android untuk merakit APK
        ./gradlew assembleDebug

    - name: Upload File APK Kamu
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-Build-APK-Sukses
        path: android-app/android/app/build/outputs/apk/debug/*.apk
