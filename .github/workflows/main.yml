name: Build APK Alternatif

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Bungkus Web Jadi APK
      run: |
        # Membuat folder proyek bersih tanpa gangguan file Cordova lama
        mkdir build-apk && cd build-apk
        npm init -y
        
        # Install tools pembungkus webview otomatis
        npm install -g native-webview || npm install native-webview
        
        # Perintah mutakhir untuk mengubah URL web menjadi file APK Android
        npx native-webview --url "https://appbuilderry.vercel.app/" --title "AppBuilder" --output "AppBuilder.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-Build-APK
        path: |
          build-apk/*.apk
          *.apk
